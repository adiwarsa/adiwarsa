name: Generate private contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SNAKE_GITHUB_TOKEN: ${{ secrets.SNAKE_GITHUB_TOKEN }}
    steps:
      - name: Validate private contribution token
        shell: bash
        run: |
          if [ -z "$SNAKE_GITHUB_TOKEN" ]; then
            echo "SNAKE_GITHUB_TOKEN is required so the snake can include private contributions."
            exit 1
          fi

      - name: Generate snake from all visible contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: adiwarsa
          github_token: ${{ env.SNAKE_GITHUB_TOKEN }}
          outputs: dist/github-contribution-grid-snake.svg

      - name: Publish snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
